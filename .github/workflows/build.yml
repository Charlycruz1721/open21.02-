name: Build Custom LiteBeam M5 XW

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout name: Build Custom LiteBeam M5 Firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential libncurses5-dev gawk git \
          gettext libssl-dev xsltproc wget unzip python3 python3-distutils \
          rsync file subversion mercurial libelf-dev ccache

    - name: Clone OpenWrt
      run: |
        git clone --depth 1 --branch v23.05.5 \
          https://github.com/openwrt/openwrt.git
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Apply Ath9k Frequency Patch
      run: |
        cd openwrt
        MAC_PATCHES=$(find package/kernel/mac80211 -name "patches" -type d | head -1)
        echo "mac80211 patches dir: $MAC_PATCHES"
        if [ -z "$MAC_PATCHES" ]; then
          MAC_PATCHES="package/kernel/mac80211/patches"
          mkdir -p "$MAC_PATCHES"
        fi
        cp $GITHUB_WORKSPACE/999-force-world-regd.patch "$MAC_PATCHES/999-force-world-regd.patch"
        echo "Parche copiado OK"
        ls -la "$MAC_PATCHES/" | grep "999"
        for KCONF in $(find target/linux/ath79 -name "config-*" 2>/dev/null); do
          echo "CONFIG_ATH_USER_REGD=y" >> "$KCONF"
          echo "Modificado: $KCONF"
        done

    - name: Parchear regdb frecuencias extendidas
      run: |
        cd openwrt
        REGDB_TXT=$(find feeds/ package/ -name "db.txt" 2>/dev/null | grep -v backup | head -1)
        echo "db.txt: $REGDB_TXT"
        if [ -n "$REGDB_TXT" ]; then
          cp "$REGDB_TXT" "${REGDB_TXT}.backup"
          printf 'country 00:\n\t(4920 - 6100 @ 80), (30), NO-CCK\n\t(4920 - 6100 @ 40), (30), NO-CCK\n\t(4920 - 6100 @ 20), (30), NO-CCK\n\t(2402 - 2472 @ 40), (20), NO-CCK\n\t(57240 - 63720 @ 2160), (0)\n\ncountry US:\n\t(4920 - 6100 @ 80), (30)\n\t(4920 - 6100 @ 40), (30)\n\t(4920 - 6100 @ 20), (30)\n\t(2402 - 2472 @ 40), (20)\n\t(57240 - 63720 @ 2160), (0)\n\ncountry MX:\n\t(4920 - 6100 @ 80), (30)\n\t(4920 - 6100 @ 40), (30)\n\t(4920 - 6100 @ 20), (30)\n\t(2402 - 2472 @ 40), (20)\n\t(57240 - 63720 @ 2160), (0)\n' > "$REGDB_TXT"
          echo "db.txt parcheado"
        fi

    - name: Custom Configuration
      run: |
        cd openwrt
        mkdir -p files/etc/config files/etc/init.d files/etc/uci-defaults files/etc/modules.d
        echo "options ath regdomain=0" > files/etc/modules.d/ath9k-custom
        printf "config system\n\toption hostname 'LiteBeam-TECNODANY'\n\toption timezone 'CST6CDT,M3.2.0,M11.1.0'\n" > files/etc/config/system
        printf "config wifi-device 'radio0'\n\toption type 'mac80211'\n\toption hwmode '11a'\n\toption channel '100'\n\toption country '00'\n\toption htmode 'HT20'\n\toption disabled '0'\nconfig wifi-iface 'default_radio0'\n\toption device 'radio0'\n\toption network 'lan'\n\toption mode 'ap'\n\toption ssid 'TECNODANY2026-AP'\n\toption encryption 'psk2'\n\toption key 'td1721DANY'\n" > files/etc/config/wireless
        printf "config interface 'loopback'\n\toption ifname 'lo'\n\toption proto 'static'\n\toption ipaddr '127.0.0.1'\n\toption netmask '255.0.0.0'\nconfig interface 'lan'\n\toption type 'bridge'\n\toption ifname 'eth0'\n\toption proto 'static'\n\toption ipaddr '192.168.1.1'\n\toption netmask '255.255.255.0'\nconfig interface 'wan'\n\toption ifname 'eth1'\n\toption proto 'dhcp'\n" > files/etc/config/network
        printf '#!/bin/sh /etc/rc.common\nSTART=11\n\nstart() {\n    sleep 2\n    rmmod ath9k 2>/dev/null\n    rmmod ath9k_common 2>/dev/null\n    rmmod ath9k_hw 2>/dev/null\n    rmmod ath 2>/dev/null\n    sleep 1\n    modprobe ath regdomain=0\n    modprobe ath9k_hw\n    modprobe ath9k_common\n    modprobe ath9k\n    sleep 1\n    iw reg set 00\n    logger "regdomain forzado a 00"\n}\nstop() { return 0; }\n' > files/etc/init.d/fix-regdomain
        chmod +x files/etc/init.d/fix-regdomain
        printf '#!/bin/sh /etc/rc.common\nSTART=99\nstart() {\n  if ! grep -q "^TECNODANY2026:" /etc/passwd; then\n    HASH=$(echo "td1721DANY" | openssl passwd -1 -stdin)\n    echo "TECNODANY2026:x:1001:1001:Admin:/home/TECNODANY2026:/bin/ash" >> /etc/passwd\n    echo "TECNODANY2026:${HASH}:19000:0:99999:7:::" >> /etc/shadow\n    mkdir -p /home/TECNODANY2026\n  fi\n}\nstop() { return 0; }\n' > files/etc/init.d/tecnodany-persist
        chmod +x files/etc/init.d/tecnodany-persist
        printf '#!/bin/sh\necho "root:td1721DANY" | chpasswd\nHASH=$(echo "td1721DANY" | openssl passwd -1 -stdin)\nif ! grep -q "^TECNODANY2026:" /etc/passwd; then\n  echo "TECNODANY2026:x:1001:1001:Admin:/home/TECNODANY2026:/bin/ash" >> /etc/passwd\n  echo "TECNODANY2026:${HASH}:19000:0:99999:7:::" >> /etc/shadow\n  mkdir -p /home/TECNODANY2026\nfi\nuci set system.@system[0].hostname=LiteBeam-TECNODANY\nuci commit system\nexit 0\n' > files/etc/uci-defaults/99-tecnodany
        chmod +x files/etc/uci-defaults/99-tecnodany

    - name: Set Target Profile
      run: |
        cd openwrt
        cat > .config << CONF
        CONFIG_TARGET_ath79=y
        CONFIG_TARGET_ath79_generic=y
        CONFIG_TARGET_ath79_generic_DEVICE_ubnt_nanostation-loco-m-xw=y
        CONFIG_ATH_USER_REGD=y
        CONFIG_PACKAGE_luci=y
        CONFIG_PACKAGE_luci-base=y
        CONFIG_PACKAGE_luci-mod-admin-full=y
        CONFIG_PACKAGE_luci-theme-bootstrap=y
        CONFIG_PACKAGE_luci-app-firewall=y
        CONFIG_PACKAGE_dropbear=y
        CONFIG_PACKAGE_kmod-ath9k=y
        CONFIG_PACKAGE_hostapd=y
        CONFIG_PACKAGE_wpad=y
        CONFIG_PACKAGE_wireless-regdb=y
        CONFIG_PACKAGE_iw=y
        CONFIG_PACKAGE_bridge=y
        CONFIG_PACKAGE_kmod-bridge=y
        CONFIG_PACKAGE_nano=y
        CONFIG_PACKAGE_curl=y
        CONFIG_PACKAGE_mtd=y
        CONF
        make defconfig

    - name: Compile Firmware
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 V=s

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: OpenWrt_LiteBeam_Custom
        path: openwrt/bin/targets/ath79/generic/*.bin
        retention-days: 90

        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses5-dev gawk git gettext libssl-dev xsltproc wget unzip python3

      - name: Clone OpenWrt
        run: |
          git clone --depth 1 --branch v23.05.5 https://git.openwrt.org/openwrt/openwrt.git
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Inject Ath9k Frequency Patch
        run: |
          # La ruta crítica para drivers wireless en OpenWrt es package/kernel/mac80211/patches/ath/
          # Usamos un prefijo alto (999) para que se aplique después de los parches oficiales.
          mkdir -p openwrt/package/kernel/mac80211/patches/ath/
          
          cat << 'EOF' > openwrt/package/kernel/mac80211/patches/ath/999-force-world-regd.patch
          --- a/drivers/net/wireless/ath/regd.c
          +++ b/drivers/net/wireless/ath/regd.c
          @@ -323,7 +323,8 @@
           
           bool ath_is_world_regd(struct ath_regulatory *reg)
           {
          -	return reg->current_rd & COUNTRY_ERD_FLAG ? false : is_wrd_sku(reg->current_rd);
          +	/* Force world regulatory for TECNODANY2026 project */
          +	return true;
           }
           EXPORT_SYMBOL(ath_is_world_regd);
           
          @@ -388,6 +389,10 @@
           	ath_print_rd_country(country);
           	ath_reg_apply_world_flags(wiphy, NL80211_REGDOM_SET_BY_DRIVER, reg);
           
          +	/* Override alpha2 to 00 (World) and reset regdomain */
          +	memcpy(reg->alpha2, "00", 2);
          +	reg->current_rd = 0;
          +
           	return 0;
           }
          EOF

      - name: Custom Configuration (Files & User)
        run: |
          cd openwrt
          mkdir -p files/etc/config
          mkdir -p files/etc/shadow
          
          # Configuración de sistema
          echo "config system" > files/etc/config/system
          echo "    option hostname 'LiteBeam-TECNODANY'" >> files/etc/config/system

          # Usuario TECNODANY2026 (password: td1721DANY)
          # Hash generado con: openssl passwd -1 td1721DANY
          echo "TECNODANY2026:\$1\$vE8.fO1.\$5N4m6G3Gk6WlXfXmP2Q5f/:19500:0:99999:7:::" > files/etc/shadow
          echo "TECNODANY2026:x:1000:1000:Admin:/home/TECNODANY2026:/bin/ash" > files/etc/passwd
          
          # Permisos para el home del usuario
          mkdir -p files/home/TECNODANY2026
          chmod 755 files/home/TECNODANY2026

      - name: Set Target Profile (XW Hardware)
        run: |
          cd openwrt
          echo "CONFIG_TARGET_ath79=y" > .config
          echo "CONFIG_TARGET_ath79_generic=y" >> .config
          # Perfil correcto para LiteBeam M5 (Hardware XW)
          echo "CONFIG_TARGET_ath79_generic_DEVICE_ubnt_nanostation-loco-m-xw=y" >> .config
          
          # Inclusión de LuCI y herramientas de diagnóstico
          echo "CONFIG_PACKAGE_luci=y" >> .config
          echo "CONFIG_PACKAGE_iw-full=y" >> .config
          echo "CONFIG_PACKAGE_ath9k-htc-firmware=y" >> .config
          make defconfig

      - name: Compile Firmware
        run: |
          cd openwrt
          # Compilación usando todos los núcleos disponibles
          make -j$(nproc) || make -j1 V=s

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LiteBeam_M5_XW_Custom
          path: openwrt/bin/targets/ath79/generic/*.bin
